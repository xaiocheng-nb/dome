<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>三框数字合计</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root {
      --bg-1: #0b1220;
      --bg-2: #111c33;
      --card: rgba(255, 255, 255, 0.04);
      --card-bd: rgba(255, 255, 255, 0.08);
      --accent: #5eead4;
      --accent-2: #818cf8;
      --text: #e7ecf3;
      --muted: #9aa7bd;
      --ok: #34d399;
      --warn: #fbbf24;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 80% -10%, rgba(129, 140, 248, 0.18), transparent 60%),
        radial-gradient(800px 600px at -10% 110%, rgba(94, 234, 212, 0.16), transparent 55%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: calc(24px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
    }

    #app { width: 100%; max-width: 460px; }

    .head { text-align: center; margin-bottom: 22px; }
    .head h1 {
      margin: 0 0 6px;
      font-size: clamp(20px, 5.5vw, 26px);
      letter-spacing: 0.5px;
    }
    .head p { margin: 0; color: var(--muted); font-size: 13px; }

    .card {
      background: var(--card);
      border: 1px solid var(--card-bd);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      backdrop-filter: blur(8px);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-title { font-weight: 600; font-size: 15px; }
    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--card-bd);
      color: var(--muted);
    }
    .badge.ok { color: var(--ok); border-color: rgba(52, 211, 153, 0.4); background: rgba(52, 211, 153, 0.08); }
    .badge.warn { color: var(--warn); border-color: rgba(251, 191, 36, 0.4); background: rgba(251, 191, 36, 0.08); }

    .field {
      width: 100%;
      font-size: 18px;
      color: var(--text);
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--card-bd);
      background: rgba(0, 0, 0, 0.25);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field::placeholder { color: #6b788f; }
    .field:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.18);
    }

    .hint { margin-top: 8px; font-size: 12px; color: var(--muted); }
    .hint b { color: var(--accent); }

    .result {
      margin-top: 12px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .result .label { font-size: 13px; color: var(--muted); }
    .result .value {
      font-size: clamp(26px, 8vw, 34px);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
    }
    .result .size {
      margin-left: 10px;
      font-size: 14px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 999px;
      align-self: center;
    }
    .result .size.small { color: var(--accent); background: rgba(94, 234, 212, 0.12); }
    .result .size.big { color: #fca5a5; background: rgba(248, 113, 113, 0.14); }

    .total {
      margin-top: 6px;
      background: linear-gradient(135deg, rgba(94, 234, 212, 0.12), rgba(129, 140, 248, 0.12));
      border: 1px solid var(--card-bd);
    }
    .total .result .value { color: #fff; }
    .total .result { margin-top: 10px; }
    .total .result:first-of-type { margin-top: 0; }
    .total .result .count {
      font-size: 14px;
      font-weight: 600;
      color: #cdd6e6;
      font-variant-numeric: tabular-nums;
    }
    .total .result .count.ying {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #fff;
    }

    .reset {
      width: 100%;
      margin-top: 16px;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid var(--card-bd);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .reset:active { background: rgba(255, 255, 255, 0.06); color: var(--text); }
  </style>
</head>
<body>
  <div id="app">
    <div class="head">
      <h1>三框数字合计</h1>
      <p>每个框输入 3 个数字，用空格或逗号分隔，例如 <b style="color:var(--accent)">1 2 3</b></p>
    </div>

    <div class="card" v-for="(box, i) in boxes" :key="i">
      <div class="card-top">
        <span class="card-title">输入框 {{ i + 1 }}</span>
        <span class="badge" :class="badgeClass(box.val)">
          {{ nums(box.val).length }} / 3 个数字
        </span>
      </div>
      <input
        class="field"
        type="text"
        inputmode="decimal"
        v-model="box.val"
        :placeholder="'输入三个数字，如：' + sample(i)"
        @input="onInput"
      />
      <div class="result">
        <span class="label">本框合计</span>
        <span class="value">{{ sum(box.val) }}</span>
        <span class="size" :class="boxSize(box.val) === '大' ? 'big' : 'small'">
          {{ boxSize(box.val) }}
        </span>
      </div>
    </div>

    <div class="card total">
      <div class="result">
        <span class="label">三框大小（小 0-13 / 大 14-28）</span>
        <span class="count">大 {{ bigCount }} 个 · 小 {{ smallCount }} 个</span>
      </div>
      <div class="result">
        <span class="label">三框单双（合计奇/偶）</span>
        <span class="count">单 {{ oddCount }} 个 · 双 {{ evenCount }} 个</span>
      </div>
      <div class="result">
        <span class="label">三框应下</span>
        <span class="count ying">{{ yingXia }}</span>
      </div>
    </div>

    <button class="reset" @click="reset">清空全部</button>
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          boxes: [{ val: '' }, { val: '' }, { val: '' }],
        };
      },
      computed: {
        grandTotal() {
          return this.boxes.reduce((s, b) => s + this.sum(b.val), 0);
        },
        // 三个框中「大」「小」的数量
        bigCount() {
          return this.boxes.filter((b) => this.boxSize(b.val) === '大').length;
        },
        smallCount() {
          return this.boxes.filter((b) => this.boxSize(b.val) === '小').length;
        },
        // 三个框中「单（奇）」「双（偶）」的数量
        oddCount() {
          return this.boxes.filter((b) => this.boxParity(b.val) === '单').length;
        },
        evenCount() {
          return this.boxes.filter((b) => this.boxParity(b.val) === '双').length;
        },
        // 三框应下：少数单双 + 少数大小 + 多数单双
        yingXia() {
          const odd = this.oddCount, even = this.evenCount;
          const big = this.bigCount, small = this.smallCount;
          if (odd + even === 0 || big + small === 0) return '—';
          const minorityParity = odd < even ? '单' : '双';
          const majorityParity = odd < even ? '双' : '单';
          const minoritySize = big < small ? '大' : '小';
          return minorityParity + ' ' + minoritySize + majorityParity;
        },
      },
      methods: {
        // 解析输入：支持空格 / 英文逗号 / 中文逗号分隔
        nums(str) {
          if (!str) return [];
          return String(str)
            .split(/[\s,，]+/)
            .map((s) => s.trim())
            .filter((s) => s !== '')
            .map((s) => Number(s))
            .filter((n) => !isNaN(n) && isFinite(n));
        },
        sum(str) {
          return this.nums(str).reduce((s, n) => s + n, 0);
        },
        // 单个框：合计 0-13 为「小」，14-28 为「大」
        boxSize(str) {
          if (this.nums(str).length === 0) return '';
          return this.sum(str) < 14 ? '小' : '大';
        },
        // 单个框：合计为整数时判断奇/偶（单/双）
        boxParity(str) {
          if (this.nums(str).length === 0) return '';
          const total = this.sum(str);
          if (!Number.isInteger(total)) return '';
          return total % 2 === 0 ? '双' : '单';
        },
        badgeClass(str) {
          const len = this.nums(str).length;
          if (len === 3) return 'ok';
          if (len > 0) return 'warn';
          return '';
        },
        sample(i) {
          return (i === 0 ? '1 2 3' : i === 1 ? '4 5 6' : '7 8 9');
        },
        onInput() {
          // 触发响应式更新（v-model 已处理，这里保留以便扩展）
        },
        reset() {
          this.boxes = [{ val: '' }, { val: '' }, { val: '' }];
        },
      },
    }).mount('#app');
  </script>
</body>
</html>
